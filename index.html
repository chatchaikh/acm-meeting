<head>

<title>Direct Report Meeting</title>
<script>
// ════════════════════════════════════════════════════════════

const MEETING_CONFIG = {
  title:    "Direct Report Meeting",
  subtitle: "Weekly alignment on progress, priorities & decisions.",
  by:       "AIS Academy",
  duration: "45 minutes",
  // Leave as "" to auto-use today's date, or set e.g. "June 12, 2026"
  date:     "",
};

/**
 * AGENDA ITEMS
 * Each item maps to a section in the deck.
 * Fields:
 *   label    — short name shown on agenda index
 *   duration — time allocation shown on agenda
 *   icon     — symbol shown on agenda card
 *   slides   — array of slide objects for this section
 *
 * SLIDE TYPES:
 *   "bullets"  — numbered bullet list
 *   "twocol"   — two side-by-side cards
 *   "closing"  — action items + next meeting card
 */
const AGENDA = [
  // ─────────────────────────────────────────────
  // SECTION 1
  // ─────────────────────────────────────────────
  {
    label:    "Wins & Updates",
    duration: "10 min",
    icon:     "✦",
    description: "Highlights, metrics & team accomplishments",
    slides: [
      {
        type:  "twocol",
        title: "Last Week's Highlights",
        left: {
          heading: "Completed",
          items: [
            "Shipped feature X to staging environment",
            "Completed Q1 performance reviews for all direct reports",
            "Resolved 12 outstanding support tickets",
            "Onboarded two new team members to the platform",
          ]
        },
        right: {
          heading: "Key Metrics",
          items: [
            "NPS score: 72 (+4 from prior week)",
            "Active users: 4,210 — up 8% week-on-week",
            "Platform uptime: 99.97%",
            "Support CSAT: 91% — above target",
          ]
        }
      },
      // ── STAT SLIDE EXAMPLE ──
      // type: "stat" — large number callouts
      {
        type:  "stat",
        title: "Performance at a Glance",
        stats: [
          { value: "4,210",  label: "Active Users",        delta: "↑ 8% WoW",  trend: "up"   },
          { value: "99.97%", label: "Platform Uptime",     delta: "On target",  trend: "flat" },
          { value: "72",     label: "NPS Score",           delta: "↑ +4 pts",   trend: "up"   },
          { value: "91%",    label: "Support CSAT",        delta: "↑ +2%",      trend: "up"   },
        ]
      },
      // ── IMAGE-LEFT SLIDE EXAMPLE ──
      // type: "image-left" or "image-right"
      // Set image: "https://..." for a real photo, or leave blank for placeholder
      {
        type:  "image-right",
        title: "Team Spotlight",
        image: "",        // ✏️ Paste any image URL here, e.g. "https://images.unsplash.com/..."
        imageAlt: "Team photo",
        items: [
          "Congratulations to the backend team for zero-downtime deployment",
          "Jordan completed AWS Solutions Architect certification",
          "Three customer success stories published this week",
        ]
      },
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 2
  // ─────────────────────────────────────────────
  {
    label:    "Priorities",
    duration: "10 min",
    icon:     "◈",
    description: "Focus areas and key objectives this week",
    slides: [
      {
        type:  "bullets",
        title: "Focus Areas This Week",
        items: [
          "Launch beta version of the new dashboard to select customers by Thursday",
          "Finalize Q2 roadmap and distribute to stakeholders before end of week",
          "Resolve authentication bug affecting enterprise accounts — classified P1",
          "Conduct three user interviews for the onboarding flow redesign initiative",
          "Review and approve updated hiring plan submitted by the People team",
        ]
      }
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 3
  // ─────────────────────────────────────────────
  {
    label:    "Blockers & Risks",
    duration: "10 min",
    icon:     "⬡",
    description: "Issues needing escalation or team support",
    slides: [
      {
        type:  "twocol",
        title: "Needs Attention",
        left: {
          heading: "Active Blockers",
          items: [
            "Legal review for partner contract — ETA unknown, escalation needed",
            "Infrastructure access request pending for new hire (Day 3)",
            "Mobile app design review stalled — awaiting PM decision",
          ]
        },
        right: {
          heading: "Risks to Monitor",
          items: [
            "Vendor API deprecation in 60 days — migration plan not yet started",
            "Two senior engineers on leave next sprint — capacity at risk",
            "Q2 growth target requires 20%; currently tracking at 14%",
          ]
        }
      }
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 4
  // ─────────────────────────────────────────────
  {
    label:    "Decisions Needed",
    duration: "8 min",
    icon:     "◇",
    description: "Alignment required before moving forward",
    slides: [
      {
        type:  "bullets",
        title: "Align & Decide",
        items: [
          "<strong>Budget approval</strong> — Proceed with the $18K infrastructure upgrade before Q2 begins?",
          "<strong>Hiring priority</strong> — Backfill the designer role or reallocate budget to an engineering hire?",
          "<strong>Launch date</strong> — Confirm May 12 public launch or push to May 19 for additional QA time?",
        ]
      },
      // ── QUOTE SLIDE EXAMPLE ──
      {
        type:   "quote",
        quote:  "Move fast and make things — but make sure the right people have made the right calls first.",
        author: "AIS Academy",
        role:   "Leadership Principle",
      },
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 5 — CLOSING (always last)
  // ─────────────────────────────────────────────
  {
    label:    "Action Items",
    duration: "7 min",
    icon:     "→",
    description: "Owners, deadlines & next meeting prep",
    slides: [
      {
        type:  "closing",
        title: "Actions & Next Steps",
        actions: [
          "Alex — Draft Q2 roadmap document by Wednesday",
          "Jordan — Escalate legal review timeline to leadership today",
          "Morgan — Schedule 3 user interviews before Thursday",
          "Sam — Patch authentication bug by Tuesday EOD",
        ],
        next: {
          when:     "Same time next week",
          prereads: "Please review the Q2 roadmap draft before the next session.",
        }
      }
    ]
  },
];

// ════════════════════════════════════════════════════════════
//  END OF EDITABLE SECTION
// ════════════════════════════════════════════════════════════
</script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────── */
:root {
  --navy:        #0b1a2e;
  --navy-mid:    #102038;
  --gold:        #c9a84c;
  --gold-light:  #e0c068;
  --gold-dim:    rgba(201,168,76,0.18);
  --white:       #f7f5f0;
  --rule:        rgba(201,168,76,0.3);
  --text:        #f7f5f0;
  --text-dim:    rgba(247,245,240,0.55);
  --text-muted:  rgba(247,245,240,0.32);
  --card-bg:     rgba(255,255,255,0.045);
  --card-border: rgba(201,168,76,0.22);
  --done-color:  #5ec988;

  /* Base font size — increase this to scale everything */
  font-size: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Arial Rounded MT Bold', 'Arial Rounded', 'Nunito', sans-serif;
  background: var(--navy);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-weight: 400;
}

/* ── GRID TEXTURE ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.028) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
  z-index: 0;
}

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed; top: 0; left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  z-index: 200;
}

/* ── DECK ── */
#deck {
  flex: 1;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: 4vh 5vw 2.5vh;
  opacity: 0; pointer-events: none;
  transform: translateY(18px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.slide.active  { opacity: 1; pointer-events: all; transform: translateY(0); }
.slide.exit    { opacity: 0; transform: translateY(-12px); transition: opacity 0.25s ease, transform 0.25s ease; }

/* ── EYEBROW ── */
.slide-eyebrow {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 1.4vh;
}
.eyebrow-rule { height: 2px; width: 36px; background: var(--gold); flex-shrink: 0; }
.eyebrow-text {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ── SLIDE H2 ── */
.slide h2 {
  font-size: clamp(2.6rem, 4.8vw, 4.4rem);
  font-weight: 700;
  line-height: 1.08;
  color: var(--white);
  margin-bottom: 2.5vh;
  max-width: 80vw;
  letter-spacing: -0.02em;
}

/* ── CONTENT ── */
.content {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
}

/* ── BULLETS ── */
.bullets {
  list-style: none;
  display: flex; flex-direction: column;
  width: 100%; max-width: 900px;
}

.bullets li {
  display: flex; align-items: flex-start; gap: 22px;
  font-size: clamp(1.05rem, 1.5vw, 1.35rem);
  line-height: 1.55;
  color: var(--text);
  padding: 1.4vh 0;
  border-bottom: 1px solid rgba(201,168,76,0.12);
}
.bullets li:first-child { border-top: 1px solid rgba(201,168,76,0.12); }

.bullet-num {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--gold);
  padding-top: 6px;
  min-width: 28px;
  flex-shrink: 0;
}

/* ── TWO-COLUMN CARDS ── */
.two-col {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 2vw; flex: 1; align-content: center;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 2.6vh 2.2vw;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 3px; height: 100%;
  background: var(--gold); opacity: 0.7;
}

.card-heading {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.6vh;
  padding-bottom: 1.2vh;
  border-bottom: 1px solid var(--rule);
}

.card ul { list-style: none; display: flex; flex-direction: column; gap: 1.1vh; }

.card ul li {
  display: flex; gap: 12px;
  font-size: clamp(0.95rem, 1.3vw, 1.2rem);
  line-height: 1.5;
  color: rgba(247,245,240,0.85);
}

.card ul li::before {
  content: '—'; color: var(--gold);
  opacity: 0.65; flex-shrink: 0; font-weight: 700;
}

/* ── CLOSING ── */
.closing-grid {
  display: grid; grid-template-columns: 3fr 2fr;
  gap: 2vw; flex: 1; align-content: center;
}

.closing-next {
  background: rgba(201,168,76,0.06);
  border: 1px solid var(--rule);
  border-radius: 16px;
  padding: 2.6vh 2.2vw;
  position: relative;
  overflow: hidden;
}

.closing-next::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.next-label {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1.2vh;
}

.next-when {
  font-size: clamp(1rem, 1.4vw, 1.25rem);
  color: var(--white); margin-bottom: 1.4vh; line-height: 1.45;
  font-weight: 700;
}

.next-preread {
  font-size: clamp(0.85rem, 1.1vw, 1rem);
  color: var(--text-dim); line-height: 1.6;
  border-top: 1px solid var(--rule);
  padding-top: 1.2vh; margin-top: 0.4vh;
}

.preread-label {
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 0.5vh;
}

/* ── TITLE SLIDE ── */
#slide-title {
  justify-content: flex-end;
  padding-bottom: 8vh;
  background:
    radial-gradient(ellipse at 78% 18%, rgba(201,168,76,0.07) 0%, transparent 48%),
    radial-gradient(ellipse at 8% 92%, rgba(10,30,60,0.95) 0%, transparent 55%),
    var(--navy);
}

#slide-title::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 44%; height: 100%;
  background: repeating-linear-gradient(
    -54deg, transparent, transparent 64px,
    rgba(201,168,76,0.022) 64px, rgba(201,168,76,0.022) 65px
  );
  pointer-events: none;
}

.title-firm {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 3vh;
  display: flex; align-items: center; gap: 14px;
}
.title-firm::before { content: ''; width: 28px; height: 2px; background: var(--gold); }

.title-main {
  font-size: clamp(4rem, 9vw, 8rem);
  font-weight: 700; line-height: 1.0;
  color: var(--white); margin-bottom: 1vh;
  max-width: 80vw; letter-spacing: -0.03em;
}

.title-rule { width: 72px; height: 2px; background: var(--gold); margin: 3vh 0 2.5vh; }

.title-subtitle {
  font-size: clamp(1rem, 1.4vw, 1.25rem);
  color: var(--text-dim); max-width: 50vw;
  line-height: 1.6; font-weight: 400;
  margin-bottom: 3vh;
}

.title-meta { display: flex; gap: 4vw; }
.meta-block { display: flex; flex-direction: column; gap: 5px; }
.meta-block .meta-key {
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); opacity: 0.8;
}
.meta-block .meta-val {
  font-size: clamp(0.9rem, 1.1vw, 1.05rem);
  font-weight: 400; color: var(--white);
}

/* ── AGENDA SLIDE ── */
#slide-agenda {
  background:
    radial-gradient(ellipse at 94% 6%, rgba(201,168,76,0.06) 0%, transparent 38%),
    var(--navy);
}

.agenda-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2vh 1.6vw;
  flex: 1; align-content: center;
}

.agenda-card {
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 2vh 1.8vw;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.18s;
  position: relative; background: var(--card-bg);
  overflow: hidden;
}

.agenda-card::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; height: 2px; width: 0;
  background: var(--gold); transition: width 0.25s ease;
}

.agenda-card:hover::after { width: 100%; }
.agenda-card:hover { border-color: rgba(201,168,76,0.55); transform: translateY(-3px); }

.agenda-card.status-done {
  border-color: rgba(94,201,136,0.3);
  background: rgba(94,201,136,0.04);
}
.agenda-card.status-done::after  { width: 100%; background: var(--done-color); }
.agenda-card.status-active {
  border-color: var(--gold);
  background: rgba(201,168,76,0.08);
  box-shadow: 0 0 0 1px rgba(201,168,76,0.2), 0 6px 28px rgba(201,168,76,0.12);
}
.agenda-card.status-active::after { width: 100%; background: var(--gold); }

/* Glowing connector line below active card pointing to nav */
.agenda-card.status-active::before {
  content: '';
  position: absolute;
  bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 2px; height: 8px;
  background: linear-gradient(180deg, var(--gold), transparent);
  pointer-events: none;
}

.agenda-card-num-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 1.4vh;
}
/* Big agenda number — prominent, left aligned */
.agenda-card-num {
  font-size: clamp(2.2rem, 3.8vw, 3.5rem);
  font-weight: 700; line-height: 1;
  color: rgba(201,168,76,0.2);
  letter-spacing: -0.05em;
  transition: color 0.25s;
}
.status-active .agenda-card-num { color: var(--gold); opacity: 1; }
.status-done   .agenda-card-num { color: rgba(94,201,136,0.5); }

/* Status badge — top right */
.card-status-badge {
  font-size: 0.55rem; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; padding: 3px 9px;
  border-radius: 20px; border: 1px solid transparent;
  color: var(--text-muted);
}
.status-active .card-status-badge {
  color: var(--gold);
  border-color: rgba(201,168,76,0.35);
  background: rgba(201,168,76,0.08);
}
.status-done .card-status-badge {
  color: var(--done-color);
  border-color: rgba(94,201,136,0.3);
  background: rgba(94,201,136,0.06);
}

.agenda-card-label {
  font-size: clamp(1rem, 1.35vw, 1.25rem);
  font-weight: 700; color: var(--white);
  display: block; margin-bottom: 0.6vh; line-height: 1.3;
}

/* Subtitle / description line */
.agenda-card-sub {
  font-size: clamp(0.72rem, 0.9vw, 0.85rem);
  color: var(--text-dim); line-height: 1.5;
  display: block; margin-bottom: 1.4vh;
  font-weight: 400;
}

.agenda-card-footer {
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
  border-top: 1px solid rgba(201,168,76,0.1);
  padding-top: 1vh; margin-top: auto;
}

.agenda-card-dur {
  font-size: clamp(0.65rem, 0.8vw, 0.78rem);
  color: var(--text-muted); letter-spacing: 0.06em;
  text-transform: uppercase; font-weight: 600;
  flex-shrink: 0;
}

/* Mini dot strip on agenda cards */
.agenda-card-dots {
  display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
  justify-content: flex-end;
}
.agenda-mini-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(201,168,76,0.15);
  transition: background 0.2s, transform 0.2s;
  flex-shrink: 0;
}
.agenda-mini-dot.active { background: var(--gold); transform: scale(1.4); }
.agenda-mini-dot.done   { background: rgba(94,201,136,0.5); }

/* ── SECTION DIVIDER ── */
.section-divider {
  justify-content: center;
  background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy) 60%);
}

.section-divider::before {
  content: ''; position: absolute;
  top: 0; right: 0; width: 3px; height: 100%;
  background: linear-gradient(180deg, var(--gold) 0%, transparent 100%);
}

.section-divider .big-num {
  position: absolute; right: 5vw; bottom: 8vh;
  font-size: clamp(7rem, 14vw, 14rem);
  font-weight: 700; color: rgba(201,168,76,0.055);
  line-height: 1; letter-spacing: -0.05em;
}

.divider-section-label {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 2.5vh;
  display: flex; align-items: center; gap: 12px;
}
.divider-section-label::before { content: ''; width: 22px; height: 2px; background: var(--gold); }

.section-divider h1 {
  font-size: clamp(3.8rem, 8vw, 7.5rem);
  font-weight: 700; line-height: 1.04;
  max-width: 75vw; color: var(--white);
  letter-spacing: -0.03em;
}

.divider-sub {
  font-size: clamp(1rem, 1.4vw, 1.3rem);
  color: var(--text-dim); margin-top: 2vh;
  max-width: 50vw; line-height: 1.6; font-weight: 400;
}

/* ── RETURN BUTTON ── */
.btn-return {
  position: absolute; top: 2.2vh; right: 5vw;
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px;
  border: 1px solid var(--rule); background: transparent;
  border-radius: 20px;
  color: var(--text-dim);
  font-family: 'Arial Rounded MT Bold', 'Arial Rounded', sans-serif;
  font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.1em; cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.btn-return:hover { color: var(--gold); border-color: var(--gold); background: rgba(201,168,76,0.06); }

/* ── NAV FOOTER ── */
#nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 2vw;
  height: 68px;
  border-top: 1px solid rgba(201,168,76,0.15);
  background: rgba(10,20,38,0.97);
  flex-shrink: 0; z-index: 2; position: relative;
}

/* Next slide title / current agenda label */
.nav-next-title {
  font-size: 0.65rem; color: var(--text-dim);
  letter-spacing: 0.05em;
  max-width: 200px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  text-align: right; font-weight: 600;
}
.nav-page-pos {
  font-size: 0.6rem; color: var(--text-muted);
  font-weight: 400; margin-left: 4px;
}

.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

.nav-btn {
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(201,168,76,0.28); background: transparent;
  border-radius: 22px;
  color: var(--text-dim);
  font-family: 'Arial Rounded MT Bold', 'Arial Rounded', sans-serif;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.nav-btn.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  font-size: 1.1rem; padding: 0;
}
.nav-btn:hover:not(:disabled) {
  color: var(--gold); border-color: var(--gold);
  background: rgba(201,168,76,0.07);
}
.nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
.nav-btn.primary {
  background: var(--gold); border-color: var(--gold);
  color: var(--navy);
}
.nav-btn.primary:hover:not(:disabled) {
  background: var(--gold-light); border-color: var(--gold-light); color: var(--navy);
}

.nav-center { display: flex; flex-direction: column; align-items: center; gap: 5px; }

/* ── UNIFIED AGENDA NAV STRIP ── */
.dot-row {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
}

/* Numbered capsule — width set dynamically by JS via --pill-w */
.agenda-num-pill {
  height: 28px;
  min-width: 28px;
  width: var(--pill-w, 28px);
  border-radius: 14px;
  border: 1px solid rgba(201,168,76,0.2);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700;
  color: rgba(247,245,240,0.28);
  cursor: pointer;
  letter-spacing: 0;
  transition: border-color 0.2s, background 0.2s, color 0.2s, transform 0.18s, width 0.3s;
  flex-shrink: 0;
}
.agenda-num-pill:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.08);
  transform: scale(1.08);
}
.agenda-num-pill.done {
  color: rgba(94,201,136,0.7);
  border-color: rgba(94,201,136,0.3);
  background: rgba(94,201,136,0.06);
}

/* Dot group capsule — current section's pages */
.dot-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.dot-group-dots {
  display: flex; gap: 6px; align-items: center;
  background: rgba(201,168,76,0.07);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 12px;
  padding: 5px 10px;
}

/* iOS page dots */
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(201,168,76,0.22);
  cursor: pointer;
  transition: background 0.22s, transform 0.22s;
  flex-shrink: 0;
}
.dot:hover { background: rgba(201,168,76,0.5); }
.dot.active {
  background: var(--gold);
  transform: scale(1.55);
  box-shadow: 0 0 6px rgba(201,168,76,0.55);
}
.dot.done { background: rgba(94,201,136,0.5); }

#slide-counter { display: none; }
.image-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0; flex: 1;
  margin: 0 -5vw -2.5vh;
}
.image-split.image-right { direction: rtl; }
.image-split.image-right > * { direction: ltr; }

.image-pane {
  background: var(--navy-mid);
  overflow: hidden; position: relative;
}
.image-pane img {
  width: 100%; height: 100%;
  object-fit: cover; opacity: 0.85;
  display: block;
}
.image-pane-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  color: var(--text-muted);
  font-size: 0.72rem; letter-spacing: 0.14em;
  text-transform: uppercase;
  border: 1px dashed rgba(201,168,76,0.2);
}
.image-pane-placeholder::before {
  content: '⬚';
  font-size: 2.5rem;
  color: rgba(201,168,76,0.2);
}

.image-content {
  padding: 4vh 3vw;
  display: flex; flex-direction: column; justify-content: center;
}

.image-content ul {
  list-style: none; display: flex; flex-direction: column; gap: 1.2vh;
  margin-top: 1vh;
}
.image-content ul li {
  display: flex; gap: 12px;
  font-size: clamp(0.95rem, 1.25vw, 1.15rem);
  line-height: 1.55; color: rgba(247,245,240,0.85);
}
.image-content ul li::before {
  content: '—'; color: var(--gold); opacity: 0.65; flex-shrink: 0;
}

/* ── QUOTE SLIDE ── */
.quote-slide {
  justify-content: center; align-items: flex-start;
  background:
    radial-gradient(ellipse at 85% 15%, rgba(201,168,76,0.07) 0%, transparent 45%),
    var(--navy);
}
.quote-mark {
  font-size: clamp(5rem, 10vw, 9rem);
  line-height: 0.7;
  color: var(--gold); opacity: 0.25;
  font-family: Georgia, serif;
  margin-bottom: 1vh;
}
.quote-text {
  font-size: clamp(1.5rem, 2.8vw, 2.6rem);
  font-weight: 700; line-height: 1.3;
  color: var(--white); max-width: 78vw;
  letter-spacing: -0.01em;
  margin-bottom: 3vh;
}
.quote-attribution {
  display: flex; align-items: center; gap: 14px;
}
.quote-attribution::before {
  content: ''; width: 36px; height: 2px; background: var(--gold);
}
.quote-author {
  font-size: clamp(0.85rem, 1.1vw, 1rem);
  color: var(--gold); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.quote-role {
  font-size: clamp(0.75rem, 0.9vw, 0.88rem);
  color: var(--text-dim); margin-left: 4px;
}

/* ── STAT SLIDE ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 2vh 2vw;
  flex: 1; align-content: center;
}
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 3vh 2.5vw;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
.stat-value {
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  font-weight: 700; color: var(--gold);
  line-height: 1; letter-spacing: -0.03em;
  margin-bottom: 0.8vh;
}
.stat-label {
  font-size: clamp(0.85rem, 1.1vw, 1rem);
  color: var(--text-dim); font-weight: 400;
  line-height: 1.4; margin-bottom: 1.2vh;
}
.stat-delta {
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 20px;
  display: inline-block;
}
.stat-delta.up   { background: rgba(94,201,136,0.15); color: var(--done-color); }
.stat-delta.down { background: rgba(255,90,90,0.12);  color: #f87171; }
.stat-delta.flat { background: rgba(201,168,76,0.12); color: var(--gold); }

/* Connector line from active agenda card down toward nav strip */
.card-connector {
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 2px; height: 0;
  background: linear-gradient(180deg, var(--gold) 0%, rgba(201,168,76,0.2) 100%);
  border-radius: 1px;
  transition: height 0.4s cubic-bezier(.4,0,.2,1), opacity 0.3s;
  opacity: 0;
  pointer-events: none;
}
.card-connector.visible {
  height: 18px;
  opacity: 1;
}
/* Pulse dot at the tip of the connector */
.card-connector.visible::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px rgba(201,168,76,0.7);
  animation: connectorPulse 1.8s ease infinite;
}
@keyframes connectorPulse {
  0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
  50%       { opacity: 0.5; transform: translateX(-50%) scale(1.5); }
}

/* ── KEYBOARD HINT ── */
.key-hint {
  position: fixed; bottom: 72px; right: 20px;
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  opacity: 0;
  animation: fadeHint 4s ease 1.5s forwards;
  pointer-events: none;
  z-index: 50;
}

@keyframes fadeHint {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="progress-bar"></div>
<div class="key-hint">← → Arrow keys to navigate · A for agenda</div>

<div id="deck">
  <!-- Slides are injected here by JavaScript -->
</div>

<nav id="nav">
  <div class="nav-left">
    <button class="nav-btn icon-btn" id="btn-prev" onclick="changeSlide(-1)" title="Previous">&#8592;</button>
    <button class="nav-btn icon-btn" id="btn-agenda" onclick="goToAgenda()" title="Agenda">⌂</button>
  </div>

  <div class="nav-center">
    <div class="dot-row" id="dot-row"></div>
    <div id="slide-counter"></div>
  </div>

  <div class="nav-right">
    <span class="nav-next-title" id="nav-next-title"></span>
    <button class="nav-btn icon-btn primary" id="btn-next" onclick="changeSlide(1)" title="Next">&#8594;</button>
  </div>
</nav>

<script>
// ══════════════════════════════════════════════════════════
//  DECK ENGINE — reads MEETING_CONFIG and AGENDA from agenda-data.js
// ══════════════════════════════════════════════════════════

const deck = document.getElementById('deck');
let slides = [];
let current = 0;
let slideMap = []; // { sectionIndex, type }

// Track which sections have been visited (for persistent done status)
const visitedSections = new Set();

// ── Date helper ──
function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

// ── SLIDE BUILDERS ──────────────────────────────────────────

function el(tag, cls, inner) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (inner !== undefined) e.innerHTML = inner;
  return e;
}

function eyebrow(text) {
  const d = el('div', 'slide-eyebrow');
  d.appendChild(el('div', 'eyebrow-rule'));
  d.appendChild(el('span', 'eyebrow-text', text));
  return d;
}

function buildTitleSlide() {
  const s = el('div', 'slide');
  s.id = 'slide-title';

  const dateStr = MEETING_CONFIG.date || formatDate(new Date());

  s.innerHTML = `
    <div class="title-firm">AIS Academy — Direct Report Meeting</div>
    <div class="title-main">${MEETING_CONFIG.title.replace(' Meeting', '<br>Meeting')}</div>
    <p class="title-subtitle">${MEETING_CONFIG.subtitle}</p>
    <div class="title-rule"></div>
    <div class="title-meta">
      <div class="meta-block">
        <span class="meta-key">Date</span>
        <span class="meta-val">${dateStr}</span>
      </div>
      <div class="meta-block">
        <span class="meta-key">By</span>
        <span class="meta-val">${MEETING_CONFIG.by}</span>
      </div>
      <div class="meta-block">
        <span class="meta-key">Duration</span>
        <span class="meta-val">${MEETING_CONFIG.duration}</span>
      </div>
    </div>
  `;
  return s;
}

function buildAgendaSlide() {
  const s = el('div', 'slide');
  s.id = 'slide-agenda';

  const topRow = el('div');
  topRow.appendChild(eyebrow('Today\'s Agenda'));

  const h = el('h2');
  h.textContent = "Today's Agenda";
  topRow.appendChild(h);
  s.appendChild(topRow);

  const grid = el('div', 'agenda-grid');
  grid.id = 'agenda-grid';
  s.appendChild(grid);
  return s;
}

function buildDividerSlide(sectionIdx, section) {
  const s = el('div', 'slide section-divider');
  const num = String(sectionIdx + 1).padStart(2, '0');
  s.innerHTML = `
    <div class="divider-section-label">Agenda ${num}</div>
    <h1>${formatDividerTitle(section.label)}</h1>
    <p class="divider-sub">${getDividerSub(section.label)}</p>
    <div class="big-num">${num}</div>
  `;
  return s;
}

function formatDividerTitle(label) {
  const words = label.split(' ');
  const mid = Math.ceil(words.length / 2);
  return words.length <= 2
    ? words.join('<br>')
    : `${words.slice(0, mid).join(' ')}<br>${words.slice(mid).join(' ')}`;
}

function getDividerSub(label) {
  const map = {
    "Wins & Updates":   "What got done since last week.",
    "Priorities":       "What we're focused on right now.",
    "Blockers & Risks": "Where we need help or alignment.",
    "Decisions Needed": "Items requiring a call from this group.",
    "Action Items":     "Ownership, accountability, and next steps.",
  };
  return map[label] || "Reviewing this section now.";
}

function buildReturnBtn() {
  const b = el('button', 'btn-return');
  b.innerHTML = '↩ AGENDA';
  b.onclick = goToAgenda;
  return b;
}

function buildBulletsSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2');
  h.textContent = slide.title;
  s.appendChild(h);
  const content = el('div', 'content');
  const ul = el('ul', 'bullets');
  slide.items.forEach((item, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="bullet-num">0${i+1}</span><span>${item}</span>`;
    ul.appendChild(li);
  });
  content.appendChild(ul);
  s.appendChild(content);
  return s;
}

function buildTwoColSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2');
  h.textContent = slide.title;
  s.appendChild(h);
  const content = el('div', 'content');
  const grid = el('div', 'two-col');

  [slide.left, slide.right].forEach(col => {
    const card = el('div', 'card');
    const heading = el('div', 'card-heading', col.heading);
    card.appendChild(heading);
    const ul = el('ul');
    col.items.forEach(item => {
      const li = el('li');
      li.innerHTML = item;
      ul.appendChild(li);
    });
    card.appendChild(ul);
    grid.appendChild(card);
  });

  content.appendChild(grid);
  s.appendChild(content);
  return s;
}

function buildClosingSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2');
  h.textContent = slide.title;
  s.appendChild(h);

  const content = el('div', 'content');
  const grid = el('div', 'closing-grid');

  // Left: action items card
  const leftCard = el('div', 'card');
  const lHeading = el('div', 'card-heading', 'Action Items');
  leftCard.appendChild(lHeading);
  const ul = el('ul');
  slide.actions.forEach(a => {
    const li = el('li');
    li.innerHTML = a;
    ul.appendChild(li);
  });
  leftCard.appendChild(ul);
  grid.appendChild(leftCard);

  // Right: next meeting card
  const rightCard = el('div', 'closing-next');
  rightCard.innerHTML = `
    <div class="next-label">Next Meeting</div>
    <div class="next-when">${slide.next.when}</div>
    <div class="next-preread">
      <div class="preread-label">Pre-read</div>
      ${slide.next.prereads}
    </div>
  `;
  grid.appendChild(rightCard);

  content.appendChild(grid);
  s.appendChild(content);
  return s;
}

function buildImageSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.style.padding = '4vh 5vw 0';
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2');
  h.textContent = slide.title;
  s.appendChild(h);

  const split = el('div', `image-split${slide.type === 'image-right' ? ' image-right' : ''}`);

  // Content pane
  const contentPane = el('div', 'image-content');
  if (slide.body) {
    const p = el('p');
    p.style.cssText = 'font-size:clamp(0.95rem,1.3vw,1.15rem);line-height:1.6;color:rgba(247,245,240,0.85);margin-bottom:1.5vh;';
    p.innerHTML = slide.body;
    contentPane.appendChild(p);
  }
  if (slide.items) {
    const ul = el('ul');
    slide.items.forEach(item => {
      const li = el('li'); li.innerHTML = item; ul.appendChild(li);
    });
    contentPane.appendChild(ul);
  }

  // Image pane
  const imgPane = el('div', 'image-pane');
  if (slide.image) {
    const img = document.createElement('img');
    img.src = slide.image;
    img.alt = slide.imageAlt || '';
    imgPane.appendChild(img);
  } else {
    const ph = el('div', 'image-pane-placeholder');
    ph.innerHTML = `<span>Add image URL in<br>agenda-data</span>`;
    imgPane.appendChild(ph);
  }

  if (slide.type === 'image-right') {
    split.appendChild(contentPane);
    split.appendChild(imgPane);
  } else {
    split.appendChild(imgPane);
    split.appendChild(contentPane);
  }
  s.appendChild(split);
  return s;
}

function buildQuoteSlide(sectionLabel, slide) {
  const s = el('div', 'slide quote-slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  s.innerHTML += `
    <div class="quote-mark">"</div>
    <div class="quote-text">${slide.quote}</div>
    <div class="quote-attribution">
      <span class="quote-author">${slide.author}</span>
      ${slide.role ? `<span class="quote-role">— ${slide.role}</span>` : ''}
    </div>
  `;
  // Re-attach return btn (innerHTML overwrites it)
  s.insertBefore(buildReturnBtn(), s.firstChild);
  return s;
}

function buildStatSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2'); h.textContent = slide.title; s.appendChild(h);
  const content = el('div', 'content');
  const grid = el('div', 'stat-grid');
  slide.stats.forEach(stat => {
    const card = el('div', 'stat-card');
    const deltaClass = stat.trend === 'up' ? 'up' : stat.trend === 'down' ? 'down' : 'flat';
    card.innerHTML = `
      <div class="stat-value">${stat.value}</div>
      <div class="stat-label">${stat.label}</div>
      ${stat.delta ? `<span class="stat-delta ${deltaClass}">${stat.delta}</span>` : ''}
    `;
    grid.appendChild(card);
  });
  content.appendChild(grid);
  s.appendChild(content);
  return s;
}



function buildDeck() {
  slides = [];
  slideMap = [];

  // Title slide
  const titleSlide = buildTitleSlide();
  deck.appendChild(titleSlide);
  slides.push(titleSlide);
  slideMap.push({ sectionIndex: -1, type: 'title' });

  // Agenda slide
  const agendaSlide = buildAgendaSlide();
  deck.appendChild(agendaSlide);
  slides.push(agendaSlide);
  slideMap.push({ sectionIndex: -1, type: 'agenda' });

  // Section slides
  AGENDA.forEach((section, sIdx) => {
    // Divider
    const divider = buildDividerSlide(sIdx, section);
    deck.appendChild(divider);
    slides.push(divider);
    slideMap.push({ sectionIndex: sIdx, type: 'divider' });

    // Content slides
    section.slides.forEach(slide => {
      let s;
      if (slide.type === 'bullets')     s = buildBulletsSlide(section.label, slide);
      if (slide.type === 'twocol')      s = buildTwoColSlide(section.label, slide);
      if (slide.type === 'closing')     s = buildClosingSlide(section.label, slide);
      if (slide.type === 'image-left')  s = buildImageSlide(section.label, slide);
      if (slide.type === 'image-right') s = buildImageSlide(section.label, slide);
      if (slide.type === 'quote')       s = buildQuoteSlide(section.label, slide);
      if (slide.type === 'stat')        s = buildStatSlide(section.label, slide);
      if (s) {
        deck.appendChild(s);
        slides.push(s);
        slideMap.push({ sectionIndex: sIdx, type: 'content' });
      }
    });
  });

  buildDots();
  buildAgendaGrid();
}

// ── AGENDA GRID ──────────────────────────────────────────────

// Map sectionIndex → first slide index of that section
function sectionStartSlide(sIdx) {
  return slideMap.findIndex(m => m.sectionIndex === sIdx);
}

function buildAgendaGrid() {
  const grid = document.getElementById('agenda-grid');
  grid.innerHTML = '';
  AGENDA.forEach((section, i) => {
    const card = el('div', 'agenda-card');
    card.id = `agenda-card-${i}`;
    const sectionSlideCount = slideMap.filter(m => m.sectionIndex === i).length;
    const miniDots = Array.from({length: sectionSlideCount}, () =>
      `<span class="agenda-mini-dot"></span>`
    ).join('');
    // subtitle falls back to duration if no description provided
    const sub = section.description || '';
    card.innerHTML = `
      <div class="agenda-card-num-row">
        <span class="agenda-card-num">${String(i+1).padStart(2,'0')}</span>
        <span class="card-status-badge">upcoming</span>
      </div>
      <span class="agenda-card-label">${section.label}</span>
      ${sub ? `<span class="agenda-card-sub">${sub}</span>` : ''}
      <div class="agenda-card-footer">
        <span class="agenda-card-dur">⏱ ${section.duration}</span>
        <div class="agenda-card-dots">${miniDots}</div>
      </div>
    `;
    // Connector line element — shown when active
    const connector = el('div', 'card-connector');
    connector.id = `connector-${i}`;
    card.appendChild(connector);
    const slideIdx = sectionStartSlide(i);
    card.onclick = () => goToSlide(slideIdx);
    grid.appendChild(card);
  });
}

function updateAgendaCards() {
  const currentSection = slideMap[current]?.sectionIndex;

  AGENDA.forEach((_, i) => {
    const card = document.getElementById(`agenda-card-${i}`);
    if (!card) return;
    const badge = card.querySelector('.card-status-badge');
    card.className = 'agenda-card';

    if (visitedSections.has(i) && i !== currentSection) {
      card.classList.add('status-done');
      if (badge) badge.textContent = 'done';
    } else if (i === currentSection) {
      card.classList.add('status-active');
      if (badge) badge.textContent = 'now';
    } else {
      if (badge) badge.textContent = 'upcoming';
    }

    // Update mini dots
    const miniDots = card.querySelectorAll('.agenda-mini-dot');
    const sectionSlideIndices = slideMap
      .map((m, idx) => ({ m, idx }))
      .filter(({ m }) => m.sectionIndex === i)
      .map(({ idx }) => idx);

    miniDots.forEach((dot, d) => {
      dot.className = 'agenda-mini-dot';
      if (i === currentSection) {
        const posInSection = sectionSlideIndices.indexOf(current);
        if (d < posInSection) dot.classList.add('done');
        else if (d === posInSection) dot.classList.add('active');
      } else if (visitedSections.has(i)) {
        dot.classList.add('done');
      }
    });

    // Connector line — animate from active card toward nav when on agenda slide
    const connector = document.getElementById(`connector-${i}`);
    if (connector) {
      connector.className = 'card-connector' + (i === currentSection ? ' visible' : '');
    }
  });
}

// ── DOTS — only for slides within current section ────────────

function buildDots() {
  // Called once at init with empty dots; real dots built in updateDots()
  updateDots();
}

function updateDots() {
  const row = document.getElementById('dot-row');
  const counter = document.getElementById('slide-counter');
  counter.textContent = '';
  row.innerHTML = '';

  const sIdx = slideMap[current]?.sectionIndex;

  AGENDA.forEach((section, i) => {
    const isCurrent = (i === sIdx);
    const isDone    = visitedSections.has(i) && !isCurrent;

    const sectionSlideIndices = slideMap
      .map((m, idx) => ({ m, idx }))
      .filter(({ m }) => m.sectionIndex === i)
      .map(({ idx }) => idx);
    const sc = sectionSlideIndices.length;

    if (isCurrent) {
      // Current section: bare dots, no wrapper
      sectionSlideIndices.forEach(slideIdx => {
        const dot = el('div', 'dot');
        if (slideIdx === current) dot.classList.add('active');
        else if (slideIdx < current) dot.classList.add('done');
        dot.onclick = () => goToSlide(slideIdx);
        row.appendChild(dot);
      });
    } else {
      // Other sections: numbered circle, width proportional to slide count
      const pill = el('div', 'agenda-num-pill');
      pill.textContent = String(i + 1);
      pill.title = section.label;
      if (isDone) pill.classList.add('done');
      pill.onclick = () => goToSlide(sectionStartSlide(i));
      const pw = Math.min(28 + (sc - 1) * 8, 62);
      pill.style.setProperty('--pill-w', pw + 'px');
      row.appendChild(pill);
    }
  });
}

// ── NAVIGATION ───────────────────────────────────────────────

function goToSlide(index) {
  if (index < 0 || index >= slides.length || index === current) return;

  const leavingSection = slideMap[current]?.sectionIndex;
  if (leavingSection >= 0) visitedSections.add(leavingSection);

  slides[current].classList.add('exit');
  slides[current].classList.remove('active');
  const leaving = current;

  current = index;
  slides[current].classList.add('active');

  setTimeout(() => slides[leaving].classList.remove('exit'), 350);

  updateUI();
}

function changeSlide(dir) { goToSlide(current + dir); }
function goToAgenda() { goToSlide(1); }

function updateUI() {
  const total = slides.length;
  const pct = total <= 1 ? 100 : Math.round((current / (total - 1)) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';

  updateDots();

  // Current agenda number + name (bottom right)
  const nextTitleEl = document.getElementById('nav-next-title');
  const curSIdx = slideMap[current]?.sectionIndex;
  if (curSIdx >= 0) {
    nextTitleEl.textContent = `${curSIdx + 1}: ${AGENDA[curSIdx].label}`;
  } else if (current === 0) {
    nextTitleEl.textContent = '';
  } else {
    nextTitleEl.textContent = 'Agenda Overview';
  }

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === slides.length - 1;
  document.getElementById('btn-agenda').style.display = current === 1 ? 'none' : '';

  updateAgendaCards();
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); changeSlide(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); changeSlide(-1);
  } else if (e.key === 'a' || e.key === 'A') {
    goToAgenda();
  }
});

// ── INIT ─────────────────────────────────────────────────────
buildDeck();
slides[0].classList.add('active');
updateUI();
</script>
</body>
