<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direct Report Meeting</title>
<script>
// ════════════════════════════════════════════════════════════
//  ✏️  EDIT THIS SECTION EACH WEEK
//  All meeting content lives here — the deck auto-updates.
// ════════════════════════════════════════════════════════════

const MEETING_CONFIG = {
  title:    "Direct Report Meeting",
  subtitle: "Weekly alignment on progress, priorities & decisions.",
  by:       "AIS Academy",
  duration: "45 minutes",
  // Leave as "" to auto-use today's date, or set e.g. "June 12, 2026"
  date:     "",
};

/**
 * AGENDA ITEMS
 * Each item maps to a section in the deck.
 * Fields:
 *   label    — short name shown on agenda index
 *   duration — time allocation shown on agenda
 *   icon     — symbol shown on agenda card
 *   slides   — array of slide objects for this section
 *
 * SLIDE TYPES:
 *   "bullets"  — numbered bullet list
 *   "twocol"   — two side-by-side cards
 *   "closing"  — action items + next meeting card
 */
const AGENDA = [
  // ─────────────────────────────────────────────
  // SECTION 1
  // ─────────────────────────────────────────────
  {
    label:    "Wins & Updates",
    duration: "10 min",
    icon:     "✦",
    slides: [
      {
        type:  "twocol",
        title: "Last Week's Highlights",
        left: {
          heading: "Completed",
          items: [
            "Shipped feature X to staging environment",
            "Completed Q1 performance reviews for all direct reports",
            "Resolved 12 outstanding support tickets",
            "Onboarded two new team members to the platform",
          ]
        },
        right: {
          heading: "Key Metrics",
          items: [
            "NPS score: 72 (+4 from prior week)",
            "Active users: 4,210 — up 8% week-on-week",
            "Platform uptime: 99.97%",
            "Support CSAT: 91% — above target",
          ]
        }
      }
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 2
  // ─────────────────────────────────────────────
  {
    label:    "Priorities",
    duration: "10 min",
    icon:     "◈",
    slides: [
      {
        type:  "bullets",
        title: "Focus Areas This Week",
        items: [
          "Launch beta version of the new dashboard to select customers by Thursday",
          "Finalize Q2 roadmap and distribute to stakeholders before end of week",
          "Resolve authentication bug affecting enterprise accounts — classified P1",
          "Conduct three user interviews for the onboarding flow redesign initiative",
          "Review and approve updated hiring plan submitted by the People team",
        ]
      }
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 3
  // ─────────────────────────────────────────────
  {
    label:    "Blockers & Risks",
    duration: "10 min",
    icon:     "⬡",
    slides: [
      {
        type:  "twocol",
        title: "Needs Attention",
        left: {
          heading: "Active Blockers",
          items: [
            "Legal review for partner contract — ETA unknown, escalation needed",
            "Infrastructure access request pending for new hire (Day 3)",
            "Mobile app design review stalled — awaiting PM decision",
          ]
        },
        right: {
          heading: "Risks to Monitor",
          items: [
            "Vendor API deprecation in 60 days — migration plan not yet started",
            "Two senior engineers on leave next sprint — capacity at risk",
            "Q2 growth target requires 20%; currently tracking at 14%",
          ]
        }
      }
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 4
  // ─────────────────────────────────────────────
  {
    label:    "Decisions Needed",
    duration: "8 min",
    icon:     "◇",
    slides: [
      {
        type:  "bullets",
        title: "Align & Decide",
        items: [
          "<strong>Budget approval</strong> — Proceed with the $18K infrastructure upgrade before Q2 begins?",
          "<strong>Hiring priority</strong> — Backfill the designer role or reallocate budget to an engineering hire?",
          "<strong>Launch date</strong> — Confirm May 12 public launch or push to May 19 for additional QA time?",
        ]
      }
    ]
  },

  // ─────────────────────────────────────────────
  // SECTION 5 — CLOSING (always last)
  // ─────────────────────────────────────────────
  {
    label:    "Action Items",
    duration: "7 min",
    icon:     "→",
    slides: [
      {
        type:  "closing",
        title: "Actions & Next Steps",
        actions: [
          "Alex — Draft Q2 roadmap document by Wednesday",
          "Jordan — Escalate legal review timeline to leadership today",
          "Morgan — Schedule 3 user interviews before Thursday",
          "Sam — Patch authentication bug by Tuesday EOD",
        ],
        next: {
          when:     "Same time next week",
          prereads: "Please review the Q2 roadmap draft before the next session.",
        }
      }
    ]
  },
];

// ════════════════════════════════════════════════════════════
//  END OF EDITABLE SECTION
// ════════════════════════════════════════════════════════════
</script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────── */
:root {
  --navy:        #0b1a2e;
  --navy-mid:    #102038;
  --gold:        #c9a84c;
  --gold-light:  #e0c068;
  --gold-dim:    rgba(201,168,76,0.18);
  --white:       #f7f5f0;
  --rule:        rgba(201,168,76,0.3);
  --text:        #f7f5f0;
  --text-dim:    rgba(247,245,240,0.55);
  --text-muted:  rgba(247,245,240,0.32);
  --card-bg:     rgba(255,255,255,0.045);
  --card-border: rgba(201,168,76,0.22);
  --done-color:  #5ec988;

  /* Base font size — increase this to scale everything */
  font-size: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Arial Rounded MT Bold', 'Arial Rounded', 'Nunito', sans-serif;
  background: var(--navy);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-weight: 400;
}

/* ── GRID TEXTURE ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.028) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
  z-index: 0;
}

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed; top: 0; left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  z-index: 200;
}

/* ── DECK ── */
#deck {
  flex: 1;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: 4vh 5vw 2.5vh;
  opacity: 0; pointer-events: none;
  transform: translateY(18px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.slide.active  { opacity: 1; pointer-events: all; transform: translateY(0); }
.slide.exit    { opacity: 0; transform: translateY(-12px); transition: opacity 0.25s ease, transform 0.25s ease; }

/* ── EYEBROW ── */
.slide-eyebrow {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 1.4vh;
}
.eyebrow-rule { height: 2px; width: 36px; background: var(--gold); flex-shrink: 0; }
.eyebrow-text {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ── SLIDE H2 ── */
.slide h2 {
  font-size: clamp(2.6rem, 4.8vw, 4.4rem);
  font-weight: 700;
  line-height: 1.08;
  color: var(--white);
  margin-bottom: 2.5vh;
  max-width: 80vw;
  letter-spacing: -0.02em;
}

/* ── CONTENT ── */
.content {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
}

/* ── BULLETS ── */
.bullets {
  list-style: none;
  display: flex; flex-direction: column;
  width: 100%; max-width: 900px;
}

.bullets li {
  display: flex; align-items: flex-start; gap: 22px;
  font-size: clamp(1.05rem, 1.5vw, 1.35rem);
  line-height: 1.55;
  color: var(--text);
  padding: 1.4vh 0;
  border-bottom: 1px solid rgba(201,168,76,0.12);
}
.bullets li:first-child { border-top: 1px solid rgba(201,168,76,0.12); }

.bullet-num {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--gold);
  padding-top: 6px;
  min-width: 28px;
  flex-shrink: 0;
}

/* ── TWO-COLUMN CARDS ── */
.two-col {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 2vw; flex: 1; align-content: center;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: 2.6vh 2.2vw;
  position: relative;
}

.card::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 3px; height: 100%;

}

.card-heading {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.6vh;
  padding-bottom: 1.2vh;
  border-bottom: 1px solid var(--rule);
}

.card ul { list-style: none; display: flex; flex-direction: column; gap: 1.1vh; }

.card ul li {
  display: flex; gap: 12px;
  font-size: clamp(0.95rem, 1.3vw, 1.2rem);
  line-height: 1.5;
  color: rgba(247,245,240,0.85);
}

.card ul li::before {
  content: '—'; color: var(--gold);
  opacity: 0.65; flex-shrink: 0; font-weight: 700;
}

/* ── CLOSING ── */
.closing-grid {
  display: grid; grid-template-columns: 3fr 2fr;
  gap: 2vw; flex: 1; align-content: center;
}

.closing-next {
  background: rgba(201,168,76,0.06);
  border: 1px solid var(--rule);
  padding: 2.6vh 2.2vw;
  position: relative;
}

.closing-next::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.next-label {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1.2vh;
}

.next-when {
  font-size: clamp(1rem, 1.4vw, 1.25rem);
  color: var(--white); margin-bottom: 1.4vh; line-height: 1.45;
  font-weight: 700;
}

.next-preread {
  font-size: clamp(0.85rem, 1.1vw, 1rem);
  color: var(--text-dim); line-height: 1.6;
  border-top: 1px solid var(--rule);

}

.preread-label {
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;

}

/* ── TITLE SLIDE ── */
#slide-title {
  justify-content: flex-end;
  padding-bottom: 8vh;
  background:
    radial-gradient(ellipse at 78% 18%, rgba(201,168,76,0.07) 0%, transparent 48%),

}

#slide-title::after {
  content: ''; position: absolute; top: 0; right: 0;

    rgba(201,168,76,0.022) 64px, rgba(201,168,76,0.022) 65px
  );
  pointer-events: none;
}

.title-firm {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 3vh;

}

.title-main {
  font-size: clamp(4rem, 9vw, 8rem);
  font-weight: 700; line-height: 1.0;

}

.title-rule { width: 72px; height: 2px; background: var(--gold); margin: 3vh 0 2.5vh; }

.title-subtitle {
  font-size: clamp(1rem, 1.4vw, 1.25rem);
  color: var(--text-dim); max-width: 50vw;
  line-height: 1.6; font-weight: 400;
  margin-bottom: 3vh;
}

.title-meta { display: flex; gap: 4vw; }
.meta-block { display: flex; flex-direction: column; gap: 5px; }
.meta-block .meta-key {
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); opacity: 0.8;
}
.meta-block .meta-val {
  font-size: clamp(0.9rem, 1.1vw, 1.05rem);

}

/* ── AGENDA SLIDE ── */
#slide-agenda {
  background:
    radial-gradient(ellipse at 94% 6%, rgba(201,168,76,0.06) 0%, transparent 38%),
    var(--navy);
}

.agenda-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));

.agenda-card {
  border: 1px solid var(--card-border);
  padding: 2vh 1.8vw;

.agenda-card::after {

  bottom: 0; left: 0; height: 2px; width: 0;
  background: var(--gold); transition: width 0.25s ease;

.agenda-card:hover::after { width: 100%; }
.agenda-card:hover { border-color: rgba(201,168,76,0.55); transform: translateY(-3px); }

.agenda-card.status-active {

.card-index {

.status-active .card-index { color: var(--gold); }

.card-status-icon { font-size: 0.85rem; color: var(--text-muted); }

<div id="progress-bar"></div>
<div class="key-hint">← → Arrow keys to navigate · A for agenda</div>

<div id="deck">

</div>

<nav id="nav">
  <div class="nav-left">
    <button class="nav-btn" id="btn-prev" onclick="changeSlide(-1)">← PREV</button>
    <button class="nav-btn" id="btn-agenda" onclick="goToAgenda()">AGENDA</button>
  </div>

  <div class="nav-center">
    <div class="dot-row" id="dot-row"></div>
    <div id="slide-counter"></div>
  </div>

  <div class="nav-right">

    <button class="nav-btn primary" id="btn-next" onclick="changeSlide(1)">NEXT →</button>
  </div>
</nav>

<script>
// ══════════════════════════════════════════════════════════
//  DECK ENGINE — reads MEETING_CONFIG and AGENDA from agenda-data.js
// ══════════════════════════════════════════════════════════

const deck = document.getElementById('deck');
let slides = [];
let current = 0;
let slideMap = []; // { sectionIndex, type }

// Track which sections have been visited (for persistent done status)
const visitedSections = new Set();

// ── Date helper ──
function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

// ── SLIDE BUILDERS ──────────────────────────────────────────

function el(tag, cls, inner) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (inner !== undefined) e.innerHTML = inner;
  return e;
}

function eyebrow(text) {
  const d = el('div', 'slide-eyebrow');
  d.appendChild(el('div', 'eyebrow-rule'));
  d.appendChild(el('span', 'eyebrow-text', text));
  return d;
}

function buildTitleSlide() {
  const s = el('div', 'slide');
  s.id = 'slide-title';

  const dateStr = MEETING_CONFIG.date || formatDate(new Date());

  s.innerHTML = `
    <div class="title-firm">AIS Academy — Direct Report Meeting</div>
    <div class="title-main">${MEETING_CONFIG.title.replace(' Meeting', '<br>Meeting')}</div>
    <p class="title-subtitle">${MEETING_CONFIG.subtitle}</p>
    <div class="title-rule"></div>
    <div class="title-meta">
      <div class="meta-block">
        <span class="meta-key">Date</span>
        <span class="meta-val">${dateStr}</span>
      </div>
      <div class="meta-block">
        <span class="meta-key">By</span>
        <span class="meta-val">${MEETING_CONFIG.by}</span>
      </div>
      <div class="meta-block">
        <span class="meta-key">Duration</span>
        <span class="meta-val">${MEETING_CONFIG.duration}</span>
      </div>
    </div>
  `;
  return s;
}

function buildAgendaSlide() {
  const s = el('div', 'slide');
  s.id = 'slide-agenda';

  const topRow = el('div');
  topRow.appendChild(eyebrow('Today\'s Agenda'));

  const h = el('h2');
  h.textContent = "What We'll Cover";
  topRow.appendChild(h);
  s.appendChild(topRow);

  const grid = el('div', 'agenda-grid');
  grid.id = 'agenda-grid';
  s.appendChild(grid);
  return s;
}

function buildDividerSlide(sectionIdx, section) {
  const s = el('div', 'slide section-divider');
  const num = String(sectionIdx + 1).padStart(2, '0');
  s.innerHTML = `
    <div class="divider-section-label">Section ${num}</div>
    <h1>${formatDividerTitle(section.label)}</h1>
    <p class="divider-sub">${getDividerSub(section.label)}</p>
    <div class="big-num">${num}</div>
  `;
  return s;
}

function formatDividerTitle(label) {
  const words = label.split(' ');
  const mid = Math.ceil(words.length / 2);
  return words.length <= 2
    ? words.join('<br>')
    : `${words.slice(0, mid).join(' ')}<br>${words.slice(mid).join(' ')}`;
}

function getDividerSub(label) {
  const map = {
    "Wins & Updates":   "What got done since last week.",
    "Priorities":       "What we're focused on right now.",
    "Blockers & Risks": "Where we need help or alignment.",
    "Decisions Needed": "Items requiring a call from this group.",
    "Action Items":     "Ownership, accountability, and next steps.",
  };
  return map[label] || "Reviewing this section now.";
}

function buildReturnBtn() {
  const b = el('button', 'btn-return');
  b.innerHTML = '↩ AGENDA';
  b.onclick = goToAgenda;
  return b;
}

function buildBulletsSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2');
  h.textContent = slide.title;
  s.appendChild(h);
  const content = el('div', 'content');
  const ul = el('ul', 'bullets');
  slide.items.forEach((item, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="bullet-num">0${i+1}</span><span>${item}</span>`;
    ul.appendChild(li);
  });
  content.appendChild(ul);
  s.appendChild(content);
  return s;
}

function buildTwoColSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2');
  h.textContent = slide.title;
  s.appendChild(h);
  const content = el('div', 'content');
  const grid = el('div', 'two-col');

  [slide.left, slide.right].forEach(col => {
    const card = el('div', 'card');
    const heading = el('div', 'card-heading', col.heading);
    card.appendChild(heading);
    const ul = el('ul');
    col.items.forEach(item => {
      const li = el('li');
      li.innerHTML = item;
      ul.appendChild(li);
    });
    card.appendChild(ul);
    grid.appendChild(card);
  });

  content.appendChild(grid);
  s.appendChild(content);
  return s;
}

function buildClosingSlide(sectionLabel, slide) {
  const s = el('div', 'slide');
  s.appendChild(buildReturnBtn());
  s.appendChild(eyebrow(sectionLabel));
  const h = el('h2');
  h.textContent = slide.title;
  s.appendChild(h);

  const content = el('div', 'content');
  const grid = el('div', 'closing-grid');

  // Left: action items card
  const leftCard = el('div', 'card');
  const lHeading = el('div', 'card-heading', 'Action Items');
  leftCard.appendChild(lHeading);
  const ul = el('ul');
  slide.actions.forEach(a => {
    const li = el('li');
    li.innerHTML = a;
    ul.appendChild(li);
  });
  leftCard.appendChild(ul);
  grid.appendChild(leftCard);

  // Right: next meeting card
  const rightCard = el('div', 'closing-next');
  rightCard.innerHTML = `
    <div class="next-label">Next Meeting</div>
    <div class="next-when">${slide.next.when}</div>
    <div class="next-preread">
      <div class="preread-label">Pre-read</div>
      ${slide.next.prereads}
    </div>
  `;
  grid.appendChild(rightCard);

  content.appendChild(grid);
  s.appendChild(content);
  return s;
}

// ── ASSEMBLE ALL SLIDES ──────────────────────────────────────

function buildDeck() {
  slides = [];
  slideMap = [];

  // Title slide
  const titleSlide = buildTitleSlide();
  deck.appendChild(titleSlide);
  slides.push(titleSlide);
  slideMap.push({ sectionIndex: -1, type: 'title' });

  // Agenda slide
  const agendaSlide = buildAgendaSlide();
  deck.appendChild(agendaSlide);
  slides.push(agendaSlide);
  slideMap.push({ sectionIndex: -1, type: 'agenda' });

  // Section slides
  AGENDA.forEach((section, sIdx) => {
    // Divider
    const divider = buildDividerSlide(sIdx, section);
    deck.appendChild(divider);
    slides.push(divider);
    slideMap.push({ sectionIndex: sIdx, type: 'divider' });

    // Content slides
    section.slides.forEach(slide => {
      let s;
      if (slide.type === 'bullets')  s = buildBulletsSlide(section.label, slide);
      if (slide.type === 'twocol')   s = buildTwoColSlide(section.label, slide);
      if (slide.type === 'closing')  s = buildClosingSlide(section.label, slide);
      if (s) {
        deck.appendChild(s);
        slides.push(s);
        slideMap.push({ sectionIndex: sIdx, type: 'content' });
      }
    });
  });

  buildDots();
  buildAgendaGrid();
}

// ── AGENDA GRID ──────────────────────────────────────────────

// Map sectionIndex → first slide index of that section
function sectionStartSlide(sIdx) {
  return slideMap.findIndex(m => m.sectionIndex === sIdx);
}

function buildAgendaGrid() {
  const grid = document.getElementById('agenda-grid');
  grid.innerHTML = '';
  AGENDA.forEach((section, i) => {
    const card = el('div', 'agenda-card');
    card.id = `agenda-card-${i}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="card-index">0${i+1}</span>
        <span class="card-status-icon">○</span>
      </div>
      <span class="agenda-icon">${section.icon}</span>
      <span class="agenda-card-label">${section.label}</span>
      <span class="agenda-card-dur">${section.duration}</span>
    `;
    const slideIdx = sectionStartSlide(i);
    card.onclick = () => goToSlide(slideIdx);
    grid.appendChild(card);
  });
}

function updateAgendaCards() {
  const currentSection = slideMap[current]?.sectionIndex;

  AGENDA.forEach((_, i) => {
    const card = document.getElementById(`agenda-card-${i}`);
    if (!card) return;
    const icon = card.querySelector('.card-status-icon');
    card.className = 'agenda-card';

    // Mark visited sections as done
    if (visitedSections.has(i) && i !== currentSection) {
      card.classList.add('status-done');
      icon.textContent = '✓';
    } else if (i === currentSection) {
      card.classList.add('status-active');
      icon.textContent = '▶';
    } else {
      icon.textContent = '○';
    }
  });
}

// ── DOTS ──────────────────────────────────────────────────────

function buildDots() {
  const row = document.getElementById('dot-row');
  row.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = el('div', 'dot');
    dot.onclick = () => goToSlide(i);
    row.appendChild(dot);
  });
}

// ── NAVIGATION ───────────────────────────────────────────────

function goToSlide(index) {
  if (index < 0 || index >= slides.length || index === current) return;

  // Track visited sections when leaving
  const leavingSection = slideMap[current]?.sectionIndex;
  if (leavingSection >= 0) visitedSections.add(leavingSection);

  // Animate out
  slides[current].classList.add('exit');
  slides[current].classList.remove('active');
  const leaving = current;

  current = index;
  slides[current].classList.add('active');

  setTimeout(() => slides[leaving].classList.remove('exit'), 350);

  updateUI();
}

function changeSlide(dir) { goToSlide(current + dir); }
function goToAgenda() { goToSlide(1); }

function updateUI() {
  const total = slides.length;
  const pct = total <= 1 ? 100 : Math.round((current / (total - 1)) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';

  const dots = document.getElementById('dot-row').children;
  Array.from(dots).forEach((d, i) => {
    d.className = 'dot' + (i === current ? ' active' : i < current ? ' done' : '');
  });

  document.getElementById('slide-counter').textContent =
    `${String(current + 1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;

  // Current section label
  const sIdx = slideMap[current]?.sectionIndex;
  const label = sIdx >= 0 ? AGENDA[sIdx].label : (current === 0 ? 'Welcome' : 'Agenda');
  document.getElementById('current-label').textContent = label.toUpperCase();

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === slides.length - 1;
  document.getElementById('btn-agenda').style.display = current === 1 ? 'none' : '';

  // Agenda return btn visibility (hide on title & agenda)
  updateAgendaCards();
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); changeSlide(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); changeSlide(-1);
  } else if (e.key === 'a' || e.key === 'A') {
    goToAgenda();
  }
});

// ── INIT ─────────────────────────────────────────────────────
buildDeck();
slides[0].classList.add('active');
updateUI();
</script>
</body>
</html>
